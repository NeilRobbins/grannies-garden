<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Granny's Garden</title>
<style>
  /* ================================================================
   * Granny's Garden — BBC Micro teletext-style browser game.
   * Everything is self-contained in this single file.
   * ================================================================ */

  :root {
    /* Teletext palette (all 8 colours). These are referenced from JS too. */
    --tt-black:   #000000;
    --tt-red:     #FF0000;
    --tt-green:   #00FF00;
    --tt-yellow:  #FFFF00;
    --tt-blue:    #0000FF;
    --tt-magenta: #FF00FF;
    --tt-cyan:    #00FFFF;
    --tt-white:   #FFFFFF;

    /* Character grid sizing — 40 columns × 25 rows is BBC Mode 7. */
    --cols: 40;
    --rows: 25;
    /* Chunky cell size. Scaled responsively via JS/CSS below. */
    --cell-w: 16px;
    --cell-h: 28px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #111;                                /* CRT surround */
    font-family: "Courier New", "Lucida Console", monospace;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* ---------- CRT surround + curvature ---------- */
  #crt-frame {
    position: relative;
    padding: 24px;
    border-radius: 24px;
    background: radial-gradient(ellipse at centre, #222 0%, #0a0a0a 70%, #000 100%);
    box-shadow:
      inset 0 0 40px rgba(0,0,0,0.9),
      0 0 30px rgba(0,0,0,0.8);
  }

  /* ---------- The display panel (40x25 character grid) ---------- */
  #display-panel {
    position: relative;
    width:  calc(var(--cols) * var(--cell-w));
    height: calc(var(--rows) * var(--cell-h));
    background: var(--tt-black);
    color: var(--tt-white);
    font-family: "Courier New", "Lucida Console", monospace;
    font-weight: 700;
    font-size: 22px;
    line-height: var(--cell-h);
    /* Phosphor glow — subtle, CRT-like. */
    text-shadow: 0 0 4px currentColor, 0 0 8px currentColor;
    border-radius: 6px;
    overflow: hidden;
    /* Slight curvature — JS toggles .crt-off on body to disable. */
    transform: perspective(800px) rotateX(0.6deg);
    transition: transform 0.2s ease;
  }

  body.crt-off #display-panel {
    transform: none;
  }

  /* ---------- Scanline overlay ---------- */
  #scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0)   0px,
      rgba(0,0,0,0)   2px,
      rgba(0,0,0,0.25) 3px,
      rgba(0,0,0,0.25) 3px
    );
    mix-blend-mode: multiply;
    opacity: 1;
    transition: opacity 0.15s ease;
    z-index: 10;
  }
  body.crt-off #scanlines,
  html body.crt-off #scanlines {
    display: none !important;
    opacity: 0 !important;
  }

  /* ---------- Internal layout of the panel ---------- */
  #art-area, #text-area, #menu-area, #status-area {
    position: relative;
    padding: 4px 12px;
  }
  #art-area  { min-height: calc(12 * var(--cell-h)); color: var(--tt-green); }
  #text-area { min-height: calc(5  * var(--cell-h)); color: var(--tt-white); }
  #menu-area { min-height: calc(4  * var(--cell-h)); color: var(--tt-yellow); }
  #status-area {
    min-height: calc(2  * var(--cell-h));
    color: var(--tt-cyan);
    border-top: 1px dashed rgba(255,255,255,0.15);
  }

  /* Divider */
  .tt-divider {
    border-top: 1px dashed rgba(255,255,255,0.15);
    margin: 2px 8px;
  }

  /* ---------- Grid (createGrid) helper element ---------- */
  .tt-grid {
    display: inline-grid;
    grid-template-columns: repeat(var(--g-cols, 40), var(--cell-w));
    grid-auto-rows: var(--cell-h);
    font-family: inherit;
    line-height: var(--cell-h);
  }
  .tt-grid .tt-cell {
    width: var(--cell-w);
    height: var(--cell-h);
    text-align: center;
    white-space: pre;
  }

  /* ---------- Menu choices ---------- */
  .tt-choice {
    background: transparent;
    color: var(--tt-yellow);
    border: none;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    text-align: left;
    padding: 2px 4px;
    cursor: pointer;
    text-shadow: inherit;
    display: inline-block;
    min-height: 32px;       /* mobile touch target */
    min-width: 44px;
  }
  .tt-choice:hover,
  .tt-choice:focus {
    color: var(--tt-white);
    background: rgba(255,255,0,0.1);
    outline: none;
  }

  /* ---------- Controls (CRT toggle, mute) ---------- */
  .tt-controls {
    position: absolute;
    top: 6px;
    right: 10px;
    display: flex;
    gap: 6px;
    z-index: 20;
  }
  .tt-controls button {
    background: #111;
    color: var(--tt-cyan);
    border: 1px solid var(--tt-cyan);
    font-family: inherit;
    font-size: 12px;
    padding: 2px 8px;
    cursor: pointer;
    opacity: 0.6;
  }
  .tt-controls button:hover,
  .tt-controls button:focus { opacity: 1; outline: none; }

  /* ---------- Responsive scaling ---------- */
  @media (max-width: 720px) {
    :root { --cell-w: 11px; --cell-h: 20px; }
    #display-panel { font-size: 16px; }
  }
  @media (max-width: 480px) {
    :root { --cell-w: 8px; --cell-h: 15px; }
    #display-panel { font-size: 12px; }
    #crt-frame { padding: 12px; border-radius: 16px; }
  }
</style>
</head>
<body>

<div id="crt-frame" role="application" aria-label="Granny's Garden game">
  <div class="tt-controls">
    <button id="crt-toggle" aria-label="Toggle CRT effect" title="Toggle CRT effect">CRT</button>
    <button id="mute-toggle" aria-label="Toggle sound" title="Toggle sound">♪</button>
  </div>

  <div id="display-panel" aria-live="polite">
    <div id="art-area"    aria-label="scene"></div>
    <div class="tt-divider"></div>
    <div id="text-area"   aria-label="narration"></div>
    <div class="tt-divider"></div>
    <div id="menu-area"   aria-label="choices" role="menu"></div>
    <div id="status-area" aria-label="status"></div>
    <div id="scanlines" aria-hidden="true"></div>
  </div>
</div>

<script>
/* ================================================================
 * GG — Granny's Garden game namespace.
 * Everything is exposed on window.GG so tests can drive it.
 * ================================================================ */
(function () {
  'use strict';

  const GG = window.GG = window.GG || {};

  // --- Teletext palette -------------------------------------------------
  GG.TELETEXT_COLORS = Object.freeze({
    black:   '#000000',
    red:     '#FF0000',
    green:   '#00FF00',
    yellow:  '#FFFF00',
    blue:    '#0000FF',
    magenta: '#FF00FF',
    cyan:    '#00FFFF',
    white:   '#FFFFFF',
  });

  // --- Grid helpers -----------------------------------------------------
  /**
   * Create a character grid element of given dimensions.
   * Each cell is a span; cells can be individually coloured.
   */
  GG.createGrid = function (cols, rows) {
    const g = document.createElement('div');
    g.className = 'tt-grid';
    g.dataset.cols = String(cols);
    g.dataset.rows = String(rows);
    g.style.setProperty('--g-cols', cols);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('span');
        cell.className = 'tt-cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.textContent = ' ';
        g.appendChild(cell);
      }
    }
    return g;
  };

  GG.getCell = function (grid, row, col) {
    const cols = Number(grid.dataset.cols);
    return grid.children[row * cols + col] || null;
  };

  GG.setCell = function (grid, row, col, ch, colour) {
    const cell = GG.getCell(grid, row, col);
    if (!cell) return;
    if (ch != null)     cell.textContent = ch;
    if (colour != null) cell.style.color = GG.TELETEXT_COLORS[colour] || colour;
  };

  GG.setCellColor = function (grid, row, col, colour) {
    GG.setCell(grid, row, col, null, colour);
  };

  /**
   * Draw a string of text at (row, col) in the given colour.
   * Characters wrap onto further cells on the same row.
   */
  GG.drawText = function (grid, row, col, text, colour) {
    for (let i = 0; i < text.length; i++) {
      GG.setCell(grid, row, col + i, text[i], colour);
    }
  };

  // --- CRT effect toggle ------------------------------------------------
  GG.toggleCRT = function () {
    document.body.classList.toggle('crt-off');
  };

  // --- Audio stubs (Task 9 fills these in) -----------------------------
  GG.blip = function () { /* replaced in task 9 */ };

  // --- Typewriter text animation ---------------------------------------
  GG.DEFAULT_TYPEWRITER_SPEED = 28;   // ms per character (feels BBC-ish)
  let activeTypewriter = null;        // the current in-flight animation

  /**
   * Render `text` into `target` character-by-character.
   * Returns a Promise that resolves when the full text is rendered or skipped.
   * Options: { speed, onChar, clear }
   */
  GG.typewriter = function (target, text, opts) {
    opts = opts || {};
    const speed  = opts.speed  != null ? opts.speed  : GG.DEFAULT_TYPEWRITER_SPEED;
    const onChar = opts.onChar || null;
    const clear  = opts.clear !== false;   // default true

    // Cancel any previous animation cleanly.
    if (activeTypewriter) activeTypewriter.skip();

    if (clear) target.textContent = '';
    const startIdx = target.textContent.length;

    return new Promise(resolve => {
      let i = 0;
      let timer = null;
      let cancelled = false;

      const state = {
        skip() {
          if (cancelled) return;
          cancelled = true;
          if (timer) clearTimeout(timer);
          target.textContent = (clear ? '' : target.textContent.slice(0, startIdx)) + text;
          if (activeTypewriter === state) activeTypewriter = null;
          resolve();
        },
      };
      activeTypewriter = state;

      function step() {
        if (cancelled) return;
        if (i >= text.length) {
          if (activeTypewriter === state) activeTypewriter = null;
          resolve();
          return;
        }
        target.textContent += text[i];
        if (onChar) {
          try { onChar(text[i], i); } catch (e) { /* never break the anim */ }
        }
        i++;
        timer = setTimeout(step, speed);
      }
      step();
    });
  };

  GG.skipTypewriter = function () {
    if (activeTypewriter) activeTypewriter.skip();
  };

  /**
   * Render a sequence of text blocks one after another (non-clearing).
   * Useful for multi-paragraph narration without wiping previous text.
   */
  GG.queueTypewriter = async function (target, blocks, opts) {
    opts = opts || {};
    target.textContent = '';
    for (let i = 0; i < blocks.length; i++) {
      const blockOpts = Object.assign({}, opts, { clear: false });
      await GG.typewriter(target, blocks[i], blockOpts);
    }
  };

  // --- Locations & navigation ------------------------------------------
  GG.LOCATIONS = {
    gardenGate: {
      name: "Granny's Garden Gate",
      exits: [ { to: 'crossroads', label: 'Walk through the gate' } ],
    },
    crossroads: {
      name: 'The Crossroads',
      exits: [
        { to: 'forest',       label: 'Take the path into the dark forest' },
        { to: 'river',        label: 'Follow the winding path to the river' },
        { to: 'mountainPath', label: 'Climb the winding mountain path' },
        { to: 'cottage',      label: 'Approach the witch\u2019s cottage' },
        { to: 'gardenGate',   label: 'Return to Granny\u2019s gate' },
      ],
    },
    forest: {
      name: 'The Dark Forest',
      exits: [ { to: 'crossroads', label: 'Return to the crossroads' } ],
    },
    river: {
      name: 'The Enchanted River',
      exits: [ { to: 'crossroads', label: 'Return to the crossroads' } ],
    },
    mountainPath: {
      name: 'The Mountain Path',
      exits: [ { to: 'crossroads', label: 'Return to the crossroads' } ],
    },
    cottage: {
      name: "The Witch's Cottage",
      exits: [ { to: 'crossroads', label: 'Flee back to the crossroads' } ],
    },
    crystalCave: {
      name: 'The Crystal Cave',
      exits: [ { to: 'mountainPath', label: 'Return to the mountain path' } ],
    },
    castleRuins: {
      name: 'The Castle Ruins',
      exits: [ { to: 'crossroads', label: 'Return to the crossroads' } ],
    },
    throneRoom: {
      name: 'The Throne Room',
      exits: [], // victory
    },
  };

  // Where hidden locations are reached from, once unlocked.
  const HIDDEN_EXITS = {
    mountainPath: { to: 'crystalCave', label: 'Enter the crystal cave' },
    crossroads:   { to: 'castleRuins', label: 'Approach the castle ruins' },
  };

  // --- Game state -------------------------------------------------------
  GG.state = null;

  GG.newGame = function () {
    GG.state = {
      currentLocation: 'gardenGate',
      visited: {},
      rescued: [],            // filled by puzzle system
      inventory: [],          // filled by inventory system
      stats: { puzzlesSolved: 0, witchEncounters: 0, itemsFound: 0 },
    };
    return GG.state;
  };

  GG.goTo = function (key) {
    if (!GG.LOCATIONS[key]) throw new Error('unknown location: ' + key);
    GG.state.currentLocation = key;
    GG.state.visited[key] = (GG.state.visited[key] || 0) + 1;
  };

  /**
   * Render the given location: location header, narrative (typewriter),
   * and numbered menu of exits.
   * The narrative content itself is filled in by task 5; for now we
   * show a placeholder.
   */
  GG.renderLocation = async function (key) {
    const loc = GG.LOCATIONS[key];
    if (!loc) throw new Error('unknown location: ' + key);
    GG.goTo(key);

    // Header (inside the status area until task 10 gives us a dedicated bar)
    const status = document.getElementById('status-area');
    let header = document.getElementById('location-header');
    if (!header) {
      header = document.createElement('div');
      header.id = 'location-header';
      header.style.fontWeight = 'bold';
      status.prepend(header);
    }
    header.textContent = '— ' + loc.name + ' —';

    // Narrative text (placeholder; task 5 fills this in).
    const textArea = document.getElementById('text-area');
    const narration = (GG.NARRATIVE && GG.NARRATIVE[key]) ||
      'You are at ' + loc.name + '.';
    await GG.typewriter(textArea, narration, { onChar: GG.blip });

    // Menu
    renderMenu(loc.exits.concat(collectHiddenExits(key)));
  };

  function collectHiddenExits(key) {
    // Task 7/8 will gate these; for now show only if state.unlocked has it.
    const hidden = HIDDEN_EXITS[key];
    if (!hidden) return [];
    if (GG.state && GG.state.unlocked && GG.state.unlocked[hidden.to]) {
      return [hidden];
    }
    return [];
  }

  function renderMenu(exits) {
    const menu = document.getElementById('menu-area');
    menu.innerHTML = '';
    exits.forEach((exit, idx) => {
      const n = idx + 1;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tt-choice';
      btn.dataset.menuChoice = exit.to;
      btn.dataset.choiceNum  = String(n);
      btn.setAttribute('role', 'menuitem');
      btn.setAttribute('aria-label',
        `Choice ${n}: ${exit.label}. Press ${n} or click to select.`);
      btn.textContent = n + '. ' + exit.label;
      btn.addEventListener('click', () => selectChoice(exit.to));
      menu.appendChild(btn);
      menu.appendChild(document.createElement('br'));
    });
  }

  function selectChoice(targetKey) {
    GG.skipTypewriter();
    // Small delay so any in-progress render settles
    setTimeout(() => { GG.renderLocation(targetKey); }, 20);
  }

  // --- Bootstrap --------------------------------------------------------
  function boot() {
    document.getElementById('crt-toggle').addEventListener('click', GG.toggleCRT);

    // Skip typewriter on click anywhere in the panel or on Space key.
    const panel = document.getElementById('display-panel');
    panel.addEventListener('click', (ev) => {
      // Don't skip when clicking a menu choice button.
      if (ev.target && ev.target.closest('[data-menu-choice]')) return;
      GG.skipTypewriter();
    });
    document.addEventListener('keydown', (ev) => {
      if (ev.key === ' ' || ev.code === 'Space') {
        GG.skipTypewriter();
        return;
      }
      // Number keys 1-9 trigger menu choices.
      if (/^[1-9]$/.test(ev.key)) {
        const btn = document.querySelector(
          `[data-menu-choice][data-choice-num="${ev.key}"]`);
        if (btn) { ev.preventDefault(); btn.click(); }
      }
    });

    // Start the game
    GG.newGame();
    GG.renderLocation('gardenGate');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
